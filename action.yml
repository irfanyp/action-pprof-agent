name: 'pprof-analyzer'
description: 'Run a pprof analyzer, feed results + repo context to an LLM, apply the generated git patch, and open a Pull Request.'
author: 'pprof-analyzer'
branding:
  icon: 'cpu'
  color: 'purple'

inputs:
  token:
    description: 'GitHub token used for checkout and creating the Pull Request.'
    required: true
  ai_endpoint:
    description: 'OpenAI-compatible endpoint URL for the LLM.'
    required: true
  ai_key:
    description: 'API key for the LLM endpoint. Also used as the bearer token for SERVICE_URL authentication.'
    required: true
  ai_model:
    description: 'LLM model name to use.'
    required: false
    default: 'gamma4'
  reference:
    description: |-
      User reference option controlling the depth/strictness of the analysis.
      Must be one of: low | med | high.
      This value is expected to come from a `workflow_dispatch` input, e.g.:
        with:
          reference: <value from the workflow_dispatch 'reference' input>
    required: true
  tags:
    description: |-
      The repository checkout branch/tag (git ref) to analyze.
      This value is expected to come from a `workflow_dispatch` input, e.g.:
        with:
          tags: <value from the workflow_dispatch 'tags' input>
    required: true
  analyzer_result_file:
    description: |-
      Optional path to a JSON file containing a pre-computed analyzer result.
      When set, the action skips the SERVICE_URL trigger/poll/submit steps (1a,
      1b, 1k) and loads the analyzer result from this file instead. Intended for
      testing purposes. When unset, the normal SERVICE_URL flow is used.
    required: false
    default: ''


outputs:
  run_id:
    description: 'The analyzer run identifier returned by the service.'
    value: ${{ steps.analyzer.outputs.run_id }}
  pr_url:
    description: 'URL of the created Pull Request (empty if none was created).'
    value: ${{ steps.analyzer.outputs.pr_url }}
  pr_number:
    description: 'Number of the created Pull Request (empty if none was created).'
    value: ${{ steps.analyzer.outputs.pr_number }}
  prompt:
    description: 'The fully-constructed prompt that was sent to the LLM (empty if not constructed).'
    value: ${{ steps.analyzer.outputs.prompt }}

runs:
  using: 'composite'
  steps:
    # ---------------------------------------------------------------------
    # 1c. Checkout the repository at the specific branch/tag.
    # ---------------------------------------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ inputs.token }}
        ref: ${{ inputs.tags }}
        fetch-depth: 0

    # ---------------------------------------------------------------------
    # Pre-requisite: Python
    # ---------------------------------------------------------------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      shell: bash
      run: |
        pip install --no-cache-dir -r ${{ github.action_path }}/scripts/requirements.txt

    # ---------------------------------------------------------------------
    # Pre-requisite: Node + repomix
    # ---------------------------------------------------------------------
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install repomix
      shell: bash
      run: npm install -g repomix

    # ---------------------------------------------------------------------
    # Pre-requisite: git (already available on GitHub runners, but ensure config)
    # ---------------------------------------------------------------------
    - name: Configure git
      shell: bash
      env:
        GITHUB_SERVER_URL: ${{ github.server_url }}
      run: |
        # Derive the GitHub host from the server URL so the noreply email
        # is correct on GitHub Enterprise Server (e.g. github.example.com)
        # and not hardcoded to github.com.
        GH_HOST=$(printf '%s' "${GITHUB_SERVER_URL:-https://github.com}" \
          | sed -E 's#^[a-zA-Z]+://##; s#[:/].*##')
        git config --global user.name  "pprof-analyzer[bot]"
        git config --global user.email "pprof-analyzer[bot]@${GH_HOST}"

    # ---------------------------------------------------------------------
    # 1a-1k. Run the analyzer orchestration script.
    # ---------------------------------------------------------------------
    - name: Run pprof analyzer
      id: analyzer
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        AI_ENDPOINT: ${{ inputs.ai_endpoint }}
        AI_KEY: ${{ inputs.ai_key }}
        AI_MODEL: ${{ inputs.ai_model }}
        REFERENCE: ${{ inputs.reference }}
        TAGS: ${{ inputs.tags }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
        ACTION_PATH: ${{ github.action_path }}
        ANALYZER_RESULT_FILE: ${{ inputs.analyzer_result_file }}
      run: |
        python "${ACTION_PATH}/scripts/analyzer.py"


    # ---------------------------------------------------------------------
    # 1i. Upload artifacts.
    # ---------------------------------------------------------------------
    - name: Upload patch artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: patch
        path: artifacts/patch.diff
        if-no-files-found: ignore

    - name: Upload raw LLM result artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: llm-result
        path: artifacts/llm_result.txt
        if-no-files-found: ignore

    - name: Upload raw repomix result artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: repomix-result
        path: artifacts/repomix_result.xml
        if-no-files-found: ignore

    - name: Upload raw analyzer result artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: analyzer-result
        path: artifacts/analyzer_result.json
        if-no-files-found: ignore

    - name: Upload constructed prompt artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: prompt
        path: artifacts/prompt.txt
        if-no-files-found: ignore

    # ---------------------------------------------------------------------
    # Cleanup phase (always runs).
    # ---------------------------------------------------------------------
    - name: Cleanup
      if: always()
      shell: bash
      env:
        AI_KEY: ${{ inputs.ai_key }}
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        echo "::group::Cleanup"
        # Remove temporary working artifacts produced by the analyzer.
        rm -rf ./artifacts ./repomix-output 2>/dev/null || true

        # Remove any local pprof working branch that was created but not
        # successfully pushed / turned into a PR.
        for branch in $(git branch --list 'pprof/fix-*' 2>/dev/null | sed 's/^[* ]*//'); do
          echo "Removing leftover local branch: $branch"
          git branch -D "$branch" 2>/dev/null || true
        done

        # Scrub secrets from the job environment so they do not leak into
        # subsequent steps or logs.
        unset AI_KEY GITHUB_TOKEN 2>/dev/null || true
        echo "Cleanup complete."
        echo "::endgroup::"
