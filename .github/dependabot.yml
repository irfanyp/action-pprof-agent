version: 2
updates:
  # Keep GitHub Actions used in action.yml up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "github-actions"

  # Keep Python dependencies in scripts/requirements.txt up to date
  - package-ecosystem: "pip"
    directory: "/scripts"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(python-deps)"
    labels:
      - "dependencies"
      - "python"

  # Keep npm tooling (repomix, pprof-to-md) in package.json up to date
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(npm-deps)"
    labels:
      - "dependencies"
      - "npm"
